<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BolsaTracker</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <h1>📈 BolsaTracker</h1>
        <p>IOL Portfolio Manager</p>
      </div>
      <div class="nav">
        <div class="nav-item active" data-page="dashboard">📊 Dashboard</div>
        <div class="nav-item" data-page="buffett">📈 Buffett 70%</div>
        <div class="nav-item" data-page="sentiment">🧠 Sentiment 30%</div>
        <div class="nav-item" data-page="approvals">✅ Approvals <span class="nav-badge" id="pending-badge" style="display:none">0</span></div>
        <div class="nav-item" data-page="history">📜 Historial</div>
      </div>
      <div class="sidebar-footer">
        Modo: <span class="mode">{{ "SANDBOX" if sandbox else "PRODUCTION" }}</span>
      </div>
    </nav>

    <!-- Main -->
    <main class="main" id="content">
      <div style="text-align:center;padding:100px 0;color:var(--muted)">Cargando...</div>
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
